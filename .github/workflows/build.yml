name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint debug build
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ddalkkak-watch-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

  onboarding-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check onboarding wizard (JS syntax + internal links)
        run: |
          node --check onboarding/app.js
          broken=0
          cd onboarding
          for f in index.html paths/*.html; do
            d=$(dirname "$f")
            for l in $(grep -oE 'href="[^"#]+"' "$f" | grep -vE 'http|mailto' | sed 's/href="//;s/"//'); do
              case "$l" in /*) continue;; esac
              [ -f "$d/$l" ] || { echo "BROKEN $f -> $l"; broken=$((broken+1)); }
            done
          done
          echo "broken_links=$broken"
          test "$broken" -eq 0
